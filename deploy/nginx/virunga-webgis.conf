# Virunga WebGIS — Nginx reverse proxy
# Copier dans /etc/nginx/sites-available/ puis lier dans sites-enabled/.

upstream virunga_frontend {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream virunga_backend {
    server 127.0.0.1:3001;
    keepalive 32;
}

server {
    listen 80;
    server_name virunga.example.org;

    # Redirection vers HTTPS (Let's Encrypt complétera la conf TLS via certbot)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name virunga.example.org;

    # ssl_certificate     /etc/letsencrypt/live/virunga.example.org/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/virunga.example.org/privkey.pem;

    # Sécurité
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 25m;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;
    gzip_min_length 1024;

    # API NestJS
    location /api/ {
        proxy_pass http://virunga_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # WebSocket Socket.IO
    location /socket.io/ {
        proxy_pass http://virunga_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    # Frontend Next.js (mode serveur)
    location / {
        proxy_pass http://virunga_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
